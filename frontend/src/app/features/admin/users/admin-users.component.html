<div class="space-y-6">
  <!-- Header -->
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-gray-800">Gestión de Usuarios</h2>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl shadow-sm p-4 flex flex-wrap gap-4">
    <div class="flex-1 min-w-64">
      <input type="text" placeholder="Buscar usuarios..." 
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTerm.set($event)"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand">
    </div>
    <select [ngModel]="roleFilter()" (ngModelChange)="roleFilter.set($event)"
      class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand">
      <option value="all">Todos los roles</option>
      <option value="user">Cliente</option>
      <option value="admin">Administrador</option>
    </select>
  </div>

  <!-- Loading -->
  @if (isLoading()) {
    <div class="text-center py-8">
      <i class="fa-solid fa-spinner fa-spin text-2xl text-brand"></i>
    </div>
  } @else {
    <!-- Users Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50">
          <tr>
            <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Usuario</th>
            <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Teléfono</th>
            <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Rol</th>
            <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Fecha de Registro</th>
            <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (user of filteredUsers(); track user.id) {
            <tr class="border-t hover:bg-gray-50">
              <td class="py-3 px-4">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 bg-brand/10 rounded-full flex items-center justify-center font-bold text-brand">
                    {{ user.name.charAt(0) }}
                  </div>
                  <div>
                    <p class="font-medium">{{ user.name }}</p>
                    <p class="text-sm text-gray-500">{{ user.email }}</p>
                  </div>
                </div>
              </td>
              <td class="py-3 px-4 text-gray-600">{{ user.phone }}</td>
              <td class="py-3 px-4">
                <span class="px-2 py-1 rounded text-xs font-medium {{ getRoleClass(user.role) }}">
                  {{ getRoleLabel(user.role) }}
                </span>
              </td>
              <td class="py-3 px-4 text-gray-600">{{ formatDate(user.createdAt) }}</td>
              <td class="py-3 px-4">
                <div class="flex gap-2">
                  <button (click)="toggleRole(user)" 
                    class="text-gray-500 hover:text-brand" 
                    title="Cambiar rol">
                    <i class="fa-solid fa-user-gear"></i>
                  </button>
                  <button (click)="deleteUser(user.id)" class="text-red-500 hover:text-red-600" title="Eliminar">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
