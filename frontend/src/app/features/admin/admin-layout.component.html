<div class="min-h-screen bg-gray-100 flex">
  <!-- Sidebar -->
  <aside class="bg-gray-900 text-white transition-all duration-300 w-64">
    <div class="p-4 border-b border-gray-800 flex justify-center items-center">
      <img src="/logo.png" class="w-36" alt="logo" />
    </div>

    <nav class="mt-4">
      <a routerLink="/admin" routerLinkActive="bg-gray-800" [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="bg-gray-800"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-users"></i>
        <span>Usuarios</span>
      </a>
      <a routerLink="/admin/pedidos" routerLinkActive="bg-gray-800"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-boxes-stacked"></i>
        <span>Pedidos</span>
      </a>
      <a routerLink="/admin/productos" routerLinkActive="bg-gray-800"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-utensils"></i>
        <span>Productos</span>
      </a>
      <a routerLink="/admin/contenido" routerLinkActive="bg-gray-800"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-pen-to-square"></i>
        <span>Contenido</span>
      </a>
      <a routerLink="/admin/legal" routerLinkActive="bg-gray-800"
        class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 transition-colors">
        <i class="fa-solid fa-gavel"></i>
        <span>Legal</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
      <h2 class="text-xl font-bold text-gray-800">Panel de Administración</h2>
      <div class="flex items-center gap-4">
        <button class="text-gray-500 hover:text-gray-700">
          <i class="fa-solid fa-bell text-xl"></i>
        </button>
        <a href="/" target="_blank" class="text-brand hover:underline text-sm">
          <i class="fa-solid fa-external-link-alt mr-1"></i> Ver sitio
        </a>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-brand rounded-full flex items-center justify-center text-white font-bold">
            A
          </div>
          <span class="text-sm font-medium">Admin</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
