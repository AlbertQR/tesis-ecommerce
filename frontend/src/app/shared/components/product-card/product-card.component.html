<div
  class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
  <div class="relative">
    <img [alt]="product().name" [src]="product().image"
         class="w-full h-48 object-cover">
    @if (product().isHot) {
      <span
        class="absolute top-2 right-2 bg-brand text-white text-xs font-bold px-2 py-1 rounded">Hot</span>
    }
    @if (product().isCombo) {
      <span
        class="absolute top-2 left-2 bg-purple-600 text-white text-xs font-bold px-2 py-1 rounded">Combo</span>
    }
    @if (product().category === 'despensa') {
      <span
        class="absolute top-2 right-2 bg-green-600 text-white text-xs font-bold px-2 py-1 rounded">Despensa</span>
    }
  </div>
  <div class="p-4">
    <span
      class="text-xs text-gray-500 uppercase font-semibold">
      {{ getCategoryLabel() }}</span>
    <h3 class="text-lg font-bold text-gray-800 mt-1">{{ product().name }}</h3>
    <p
      class="text-gray-600 text-sm mt-1 line-clamp-2">{{ product().description }}</p>
    <div class="flex justify-between items-center mt-4">
      <span
        class="text-xl font-bold text-brand">{{ product().price | formatPrice }}</span>
      <button (click)="addToCart()"
              class="w-8 h-8 rounded-full bg-gray-100 text-brand hover:bg-brand hover:text-white flex items-center justify-center transition-colors">
        <i class="fa-solid fa-cart-plus"></i>
      </button>
    </div>
  </div>
</div>
